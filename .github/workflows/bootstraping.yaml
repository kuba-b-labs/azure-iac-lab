name: Bootstrap azure-iac-lab after provisioning
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa


      - name: Install Ansible Azure collection
        run: |
          pip install ansible --break-system-packages 2>/dev/null || pip install ansible
          ansible-galaxy collection install azure.azcollection --force
          pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt

      - name: Test Ansible connectivity to dynamic inventory
        run: |
          ansible-playbook -i ansible/inventory/azure_rm.yml ansible/playbooks/bootstrap.yaml --private-key ~/.ssh/id_rsa

      - name: Run Ansible playbook
        run: ansible-playbook -i ansible/inventory/azure_rm.yml ansible/playbooks/bootstrap.yaml --private-key ~/.ssh/id_rsa
