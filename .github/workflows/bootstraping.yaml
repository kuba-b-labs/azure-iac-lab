name: Bootstrap azure-iac-lab after provisioning
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt --break-system-packages
      
      - name: Test Ansible connectivity to dynamic inventory
        run: ansible azure-iac-lab -i azure_rm.yml -m ping
        working-directory: ./ansible/inventory

      - name: Run Ansible playbook
        run: ansible-playbook -i azure_rm.yml ./ansible/playbooks/bootstrap.yaml
