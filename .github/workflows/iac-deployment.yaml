name: Infrastructure deployment
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose the action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_USE_OIDC: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Keyvault secrets retrieval
        id: keyvault-secrets
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: 'iac-lab-kv'
          secrets: 'grafana-user,grafana-password'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: | 
          terraform init
        working-directory: ./terraform

      - name: Apply Terraform configuration
        run: | 
          if [[ "${{ github.event.inputs.action }}" == "apply" ]]; then
            terraform apply -auto-approve -var "grafana_user=${{ steps.keyvault-secrets.outputs.GRAFANA_USER }}" -var "grafana_password=${{ steps.keyvault-secrets.outputs.GRAFANA_PASSWORD }}" -var "sub_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -var "ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
          else
            terraform destroy -auto-approve -var "grafana_user=${{ steps.keyvault-secrets.outputs.GRAFANA_USER }}" -var "grafana_password=${{ steps.keyvault-secrets.outputs.GRAFANA_PASSWORD }}" -var "sub_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -var "ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
          fi
        working-directory: ./terraform