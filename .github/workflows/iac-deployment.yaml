name: Infrastructure deployment
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_USE_OIDC: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Keyvault secrets retrieval
        id: keyvault-secrets
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: 'iac-lab-kv'
          secrets: 'GRAFANA_USER,GRAFANA_PASSWORD'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: | 
          terraform init
        working-directory: ./terraform

      - name: Apply Terraform configuration
        run: | 
          terraform apply -auto-approve -var "grafana_user=${{ steps.keyvault-secrets.outputs.GRAFANA_USER }}" -var "grafana_password=${{ steps.keyvault-secrets.outputs.GRAFANA_PASSWORD }}"
        working-directory: ./terraform